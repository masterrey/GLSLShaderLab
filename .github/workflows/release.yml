name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0)'
        required: true
        default: 'v0.0.0'

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore src/GLSLShaderLab.App.Wpf/GLSLShaderLab.App.Wpf.csproj

      - name: Publish Studio (self-contained win-x64)
        run: |
          dotnet publish src/GLSLShaderLab.App.Wpf/GLSLShaderLab.App.Wpf.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output publish/GLSLShaderLab

      - name: Zip artifact
        run: Compress-Archive -Path publish/GLSLShaderLab/* -DestinationPath publish/GLSLShaderLab-win-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GLSLShaderLab-win-x64
          path: publish/GLSLShaderLab-win-x64.zip

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: GLSLShaderLab ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          files: publish/GLSLShaderLab-win-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
